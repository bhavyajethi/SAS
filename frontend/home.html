<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Liveness-Guard | Portal</title>
    <style>
        * { box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: #0f172a; color: white; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .container { background: #1e293b; padding: 40px; border-radius: 12px; text-align: center; border-top: 4px solid #38bdf8; width: 400px; }
        h1 { color: #38bdf8; margin-bottom: 30px; }
        .btn { display: block; width: 100%; padding: 15px; margin-bottom: 15px; background: #334155; color: white; text-decoration: none; border-radius: 8px; font-weight: bold; transition: 0.2s; border: 1px solid #475569; text-align: center; }
        .btn:hover { background: #38bdf8; border-color: #38bdf8; color: #0f172a; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Liveness-Guard</h1>
        <a href="/student" class="btn">Student Attendance Kiosk</a>
        <a href="/register" class="btn">New Student Registration</a>
        <a href="/admin" class="btn">Teacher Dashboard</a>
    </div>
</body>
</html>
