<!DOCTYPE html>
<html lang="en">
<head>
    <style>
        body { background: #0f172a; color: white; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; font-family: sans-serif; }
        .status-box { padding: 40px; border-radius: 20px; background: #1e293b; text-align: center; border: 2px solid #38bdf8; }
        h1 { color: #38bdf8; margin-bottom: 10px; }
        .blink-msg { font-size: 1.2rem; color: #94a3b8; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
    </style>
</head>
<body>
    <div class="status-box">
        <h1>Liveness-Guard</h1>
        <p class="blink-msg">Please look at the camera and blink to mark attendance</p>
        <div id="user-display" style="margin-top: 20px; font-size: 1.5rem; font-weight: bold; color: #22c55e;"></div>
    </div>

    <script>
        async function checkStatus() {
            const res = await fetch('/api/data');
            const data = await res.json();
            if (data.present_logs.length > 0) {
                const latest = data.present_logs[0];
                document.getElementById('user-display').innerText = "Last Marked: " + latest.Name;
            }
        }
        setInterval(checkStatus, 2000);
    </script>
</body>
</html>
