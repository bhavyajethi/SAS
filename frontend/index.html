<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Liveness-Guard | Control Center</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body { background: #0f172a; color: #f8fafc; padding: 2rem; }
        
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem; border-bottom: 1px solid #334155; padding-bottom: 1rem; }
        h1 { font-size: 1.8rem; color: #38bdf8; display: flex; align-items: center; gap: 10px; }
        .live-dot { width: 12px; height: 12px; background: #22c55e; border-radius: 50%; box-shadow: 0 0 10px #22c55e; animation: pulse 1.5s infinite; }
        
        .download-btn { background: #3b82f6; color: white; padding: 8px 16px; border-radius: 6px; text-decoration: none; font-weight: bold; font-size: 0.9rem; display: flex; align-items: center; gap: 8px; transition: background 0.2s; border: 1px solid #2563eb; }
        .download-btn:hover { background: #2563eb; }
        .filter-select { padding: 8px; border-radius: 6px; background: #1e293b; color: white; border: 1px solid #334155; font-weight: bold; }

        .stats-grid { display: flex; gap: 20px; margin-bottom: 20px; }
        .stat-card { background: #1e293b; padding: 20px; border-radius: 10px; flex: 1; text-align: center; border-top: 3px solid #334155; }
        .stat-card h3 { color: #94a3b8; font-size: 0.9rem; text-transform: uppercase; margin-bottom: 10px; }
        .stat-card h2 { font-size: 2.5rem; }
        .border-green { border-top-color: #22c55e; }
        .border-red { border-top-color: #ef4444; }

        .main-grid { display: grid; grid-template-columns: 2fr 1fr; gap: 20px; }
        .panel { background: #1e293b; border-radius: 10px; padding: 20px; }
        .panel h2 { margin-bottom: 15px; font-size: 1.2rem; color: #cbd5e1; border-bottom: 1px solid #334155; padding-bottom: 10px; }
        
        table { width: 100%; border-collapse: collapse; text-align: left; }
        th { background: #334155; color: #94a3b8; padding: 10px; font-size: 0.8rem; }
        td { padding: 12px 10px; border-bottom: 1px solid #334155; }
        
        .badge-green { background: rgba(34, 197, 94, 0.2); color: #4ade80; padding: 4px 8px; border-radius: 12px; font-size: 0.8rem; }
        .badge-blue { background: rgba(56, 189, 248, 0.2); color: #7dd3fc; padding: 4px 8px; border-radius: 12px; font-size: 0.8rem; }
        .absent-item { padding: 12px; background: rgba(239, 68, 68, 0.1); border-left: 4px solid #ef4444; margin-bottom: 8px; border-radius: 4px; color: #fca5a5; font-weight: bold; }

        @keyframes pulse { 0% { opacity: 0.5; } 50% { opacity: 1; } 100% { opacity: 0.5; } }
    </style>
</head>
<body>

    <div class="header">
        <div style="display: flex; align-items: center; gap: 20px;">
            <h1><div class="live-dot"></div> Liveness-Guard Control Center</h1>
            <select id="subjectFilter" class="filter-select">
                <option value="All">All Subjects (Global View)</option>
                <option value="Physics">Physics</option>
                <option value="Maths">Maths</option>
                <option value="Chemistry">Chemistry</option>
                <option value="Deep Learning">Deep Learning</option>
                <option value="Cloud Computing">Cloud Computing</option>
                <option value="Gen AI">Gen AI</option>
                <option value="Data Structures">Data Structures</option>
                <option value="Operating Systems">Operating Systems</option>
                <option value="Databases">Databases</option>
                <option value="Computer Networks">Computer Networks</option>
            </select>
        </div>
        <div style="display: flex; gap: 20px; align-items: center;">
            <p id="clock" style="color: #94a3b8; font-weight: bold;"></p>
            <a href="/api/download" class="download-btn">📥 Export Report</a>
        </div>
    </div>

    <div class="stats-grid">
        <div class="stat-card">
            <h3>Total Registered</h3>
            <h2 id="stat-total">0</h2>
        </div>
        <div class="stat-card border-green">
            <h3>Present</h3>
            <h2 id="stat-present" style="color: #4ade80;">0</h2>
        </div>
        <div class="stat-card border-red">
            <h3>Defaulters (Missing)</h3>
            <h2 id="stat-absent" style="color: #f87171;">0</h2>
        </div>
    </div>

    <div class="main-grid">
        <div class="panel">
            <h2>Live Entry Logs</h2>
            <table>
                <thead><tr><th>Name</th><th>Time In</th><th>Subject</th><th>Status</th><th>Security</th></tr></thead>
                <tbody id="table-body"></tbody>
            </table>
        </div>
        <div class="panel">
            <h2>Missing Students</h2>
            <div id="absent-list"></div>
        </div>
    </div>

    <script>
        setInterval(() => document.getElementById('clock').innerText = new Date().toLocaleTimeString(), 1000);

        async function fetchUI() {
            try {
                const sub = document.getElementById('subjectFilter').value;
                const res = await fetch('/api/data?subject=' + encodeURIComponent(sub) + '&t=' + new Date().getTime());
                const data = await res.json();
                
                document.getElementById('stat-total').innerText = data.stats.total;
                document.getElementById('stat-present').innerText = data.stats.present;
                document.getElementById('stat-absent').innerText = data.stats.absent;

                const tbody = document.getElementById('table-body');
                tbody.innerHTML = '';
                data.present_logs.forEach(row => {
                    tbody.innerHTML += `<tr>
                        <td style="font-weight:bold;">${row.Name}</td>
                        <td style="font-family:monospace;">${row.Time}</td>
                        <td style="color:#a855f7; font-weight:bold;">${row.Subject || '-'}</td>
                        <td><span class="badge-green">${row.Status}</span></td>
                        <td><span class="badge-blue">${row.Liveness}</span></td>
                    </tr>`;
                });

                const alist = document.getElementById('absent-list');
                alist.innerHTML = '';
                if(data.absent.length === 0) {
                    alist.innerHTML = '<p style="color:#94a3b8; font-size:0.9rem;">All students present.</p>';
                } else {
                    data.absent.forEach(name => {
                        alist.innerHTML += `<div class="absent-item">${name}</div>`;
                    });
                }
            } catch (err) { console.error("Error fetching data:", err); }
        }

        document.getElementById('subjectFilter').addEventListener('change', fetchUI);
        setInterval(fetchUI, 2000);
        fetchUI();
    </script>
</body>
</html>
